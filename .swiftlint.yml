# SwiftLint configuration
# Inherits from the shared parent configuration in swift-standards

parent_config: https://raw.githubusercontent.com/swift-primitives/.github/main/.swiftlint.yml

# Package-specific overrides
disabled_rules:
  - function_parameter_count
  # empty_count false-positives on the institute's typed-count metadata idiom
  # (count == 0 where the type is not a Collection). Relaxed per principal decision 2026-06-02.
  - empty_count
  # no_int_bitpattern_arithmetic over-fires on stdlib Collection conformance: distance(from:to:)->Int
  # and index(_:offsetBy: Int) signatures are stdlib-mandated and must consume/produce raw signed Int.
  - no_int_bitpattern_arithmetic
  # no_try_optional fires on a deliberate `try? …predecessor.exact()` that maps underflow to nil for a
  # failable predecessor() — converting to do/catch would change the API's nil-on-failure semantics.
  - no_try_optional
